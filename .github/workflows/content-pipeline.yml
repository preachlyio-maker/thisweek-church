name: Content Pipeline

on:
  schedule:
    # Daily at 11:00 AM UTC — refreshes reads, trends, and ~2 new articles.
    - cron: "0 11 * * *"
  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: node pipeline/run.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          # Optional: set repo variable ARTICLE_AUTOPUBLISH=true to publish AI
          # articles immediately. Left unset = saved as drafts for your review.
          ARTICLE_AUTOPUBLISH: ${{ vars.ARTICLE_AUTOPUBLISH }}
          # Optional: enables the auto-refreshing YouTube video wall.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
